# Compile the bridge into standalone binaries and attach them to the GitHub
# Release, so non-technical users can download a single file (no Node needed).
#
# Trigger by pushing a tag like `v0.2.0`. Each platform builds on its OWN native
# runner: the Claude Agent SDK pulls in a native dependency (sharp), which can't
# be cross-compiled, so we install with `npm ci` and compile with Bun per-OS.
#
# Phase A ships UNSIGNED binaries — macOS Gatekeeper / Windows SmartScreen will
# warn until signing is wired up (Phase B: Apple Developer ID + Windows cert).
name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            out: chatpanel-bridge-linux-x64
          - os: macos-14
            out: chatpanel-bridge-macos-arm64
          # macOS Intel (x64) omitted: GitHub's macos-13 runners are scarce and
          # leave jobs queued indefinitely. Intel-Mac users use `npx @chatpanel/bridge`.
          - os: windows-latest
            out: chatpanel-bridge-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Lean binary: skip the optional Claude Agent SDK (and its native `sharp`).
      # The SDK fallback is disabled inside compiled binaries anyway — they drive
      # the native `claude` CLI — so bundling it is pure bloat.
      - run: npm ci --omit=optional || npm install --omit=optional

      - uses: oven-sh/setup-bun@v2

      # Native build (no --target): bundles this platform's native addons. The
      # SDK is marked external so the dynamic import() doesn't pull it into the
      # bundle; at runtime in the binary it resolves to null (fallback off).
      - name: Build ${{ matrix.out }}
        shell: bash
        run: |
          mkdir -p dist
          bun build src/server.js --compile --external @anthropic-ai/claude-agent-sdk --outfile "dist/${{ matrix.out }}"

      # Ad-hoc sign so macOS reports "unidentified developer" (with Open Anyway)
      # instead of "damaged". Real notarization needs an Apple Developer ID.
      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - "dist/${{ matrix.out }}"

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.out }}
          body: |
            Standalone ChatPanel Bridge binaries — no Node.js required.

            **Run once to install background auto-start:**
            - macOS / Linux: `chmod +x chatpanel-bridge-* && ./chatpanel-bridge-* --install`
            - Windows: `chatpanel-bridge-windows-x64.exe --install`

            ⚠️ Not yet code-signed, so macOS Gatekeeper / Windows SmartScreen may
            warn on first run (on macOS: right-click → Open). Signing is coming.

  # Publish to npm so `npx @chatpanel/bridge` (the Node path, for users without a
  # binary) also gets this version. The package is pure JS with no dependencies,
  # so there's nothing to build — it just ships src/. Needs an NPM_TOKEN secret
  # (an npm "Automation" token); skips cleanly if it isn't set.
  publish-npm:
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
      - name: Skip notice
        if: ${{ env.NPM_TOKEN == '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "::notice::Skipped npm publish — add an NPM_TOKEN secret (npm Automation token) to enable."
